app:
  notification:
    cleanup:
      enabled: true
      retain-days: 7
      batch-size: 100

  email:
    enabled: true
    from-address: mas@systems.gov.bt
    from-name: Mines Administrative System
    support-email: mas@systems.gov.bt
    retry-attempts: 3

server:
  port: 8085
  address: 0.0.0.0
#  address: 127.0.0.1  # Uncomment to accept connections only from this host (gateway on same machine); in Kubernetes use NetworkPolicy instead
  tomcat:
    relaxed-query-chars: "|,{,},[,],^,@,$,&,+,="

spring:
  jackson:
    time-zone: Asia/Thimphu

  application:
    name: mas-backend-mining-lease

  datasource:
#    url: jdbc:postgresql://localhost:5432/postgres
    url: jdbc:postgresql://172.30.3.10:30432/mas_db?tcpKeepAlive=true&socketTimeout=300
    username: postgres
    password: 4GbRIVm8KuYXzEJB
#    password: root
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 600000
      keepalive-time: 60000
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_schema: mas_db
#        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  file:
    upload-dir: /opt/Storage

  qr:
    qr-link: https://drugrims.systems.gov.bt/QrDetails

  mail:
    host: mail.systems.gov.bt
    port: 587
    username: mas@systems.gov.bt
    password: 5xk5ZtSAyRcB
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          ssl:
            trust: mail.systems.gov.bt
            protocols: TLSv1.2

  # Redis Cache Configuration
  # To enable Redis caching:
  # 1. Install Redis (Docker: docker run -d -p 6379:6379 redis:latest)
  # 2. Change cache.type from 'none' to 'redis'
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      password:
#      timeout: 60000
#      jedis:
#        pool:
#          max-active: 20
#          max-idle: 10
#          min-idle: 5
#          max-wait: -1ms

  cache:
    type: none  # Using in-memory token blacklist instead of Redis
    redis:
