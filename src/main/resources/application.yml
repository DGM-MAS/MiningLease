---
# ── Production profile ── activate with SPRING_PROFILES_ACTIVE=prod in Kubernetes
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://postgres:5432/mas_db  # ClusterIP DNS — no NodePort needed inside the cluster
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
        format_sql: false
