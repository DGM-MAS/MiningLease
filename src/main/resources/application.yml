# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    doc-expansion: none
    default-models-expand-depth: -1
    persist-authorization: true
    filter: true
    try-it-out-enabled: true
    display-request-duration: true
    deep-linking: true
    custom-javascript: /swagger-custom.js
  show-actuator: false
  packages-to-scan: com.mas.gov.bt.mas.primary.controller
  paths-to-match: /api/**

